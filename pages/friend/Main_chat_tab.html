<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlayMatch Chat</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0"
    />
    <link rel="stylesheet" href="static/css/Friend_css/Friend_main.css" />
    <script src="static/js/chat.js"></script>
  </head>

  <body>
    <div class="friend-wrapper">
      <div class="friend-sidebar">
        <div class="friend-search-bar">
          <span class="material-symbols-outlined">search</span>
          <input
            type="text"
            id="friendSearch"
            onkeyup="filterFriends()"
            placeholder="친구 검색"
          />
        </div>
        <button onclick="openFriendAddModal()">친구 추가</button>
        <table class="friend-list">
          <tbody id="friendList"></tbody>
        </table>
      </div>
      <div class="friend-chat-area">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
          <input
            type="text"
            id="chatInput"
            placeholder="메시지를 입력하세요"
            onkeypress="handleEnter(event)"
          />
          <button onclick="sendMessage()">전송</button>
        </div>
      </div>
    </div>
  </body>
</html>
